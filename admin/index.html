<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | AcademeKey</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">

  <style>
    /* Admin specific overrides */
    body { background: #f8fafc; padding: 0; margin: 0; font-family: 'Inter', sans-serif; }
    
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .admin-title { font-size: 24px; font-weight: 700; color: #0f172a; }
    
    .admin-btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .admin-btn-primary { background: #10B981; color: white; }
    .admin-btn-primary:hover { background: #059669; }
    .admin-btn-outline { background: transparent; border: 1px solid #cbd5e1; color: #475569; }
    .admin-btn-outline:hover { background: #f1f5f9; }

    /* Login Screen */
    #adminLogin {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
    .admin-input {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-family: inherit;
    }
    
    /* Dashboard Tabs */
    .admin-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 10px;
    }
    .admin-tab {
      padding: 8px 16px;
      cursor: pointer;
      font-weight: 500;
      color: #64748b;
      border-radius: 6px;
    }
    .admin-tab.active {
      background: #e0f2fe;
      color: #0369a1;
    }
    
    /* Tables */
    .admin-table-wrapper {
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      overflow-x: auto;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    .admin-table th {
      padding: 12px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      font-weight: 600;
      color: #475569;
      font-size: 13px;
    }
    .admin-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #e2e8f0;
      color: #334155;
      font-size: 14px;
    }

    /* Modal Form */
    #courseModal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 14px; }
    
    .course-thumb-preview {
      width: 80px; height: 80px; object-fit: cover; border-radius: 6px;
      background: #f1f5f9; display: block; margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <!-- LOGIN SECTION -->
  <div id="adminLogin">
    <div style="text-align: center; margin-bottom: 24px;">
      <img src="../assets/img/Academekey logo.png" alt="Logo" width="120">
      <h2 style="margin-top: 16px; font-size: 20px;">Admin Login</h2>
    </div>
    <form id="loginForm">
      <input type="email" id="loginEmail" class="admin-input" placeholder="Email Address" required>
      <input type="password" id="loginPassword" class="admin-input" placeholder="Password" required>
      <button type="submit" class="admin-btn admin-btn-primary" style="width: 100%;">Log In</button>
      <div id="loginError" style="color: #ef4444; font-size: 13px; margin-top: 12px; display: none;"></div>
    </form>
  </div>

  <!-- DASHBOARD SECTION -->
  <div id="adminDashboard" class="admin-container" style="display: none;">
    <div class="admin-header">
      <div class="admin-title">AcademeKey Admin</div>
      <button id="logoutBtn" class="admin-btn admin-btn-outline">Log Out</button>
    </div>

    <div class="admin-tabs">
      <div class="admin-tab active" data-tab="enquiries">Enquiries</div>
      <div class="admin-tab" data-tab="courses">Courses</div>
    </div>

    <!-- ENQUIRIES TAB -->
    <div id="tab-enquiries" class="tab-content">
      <h3 style="margin-bottom: 16px;">Recent Enquiries</h3>
      <div class="admin-table-wrapper">
        <table class="admin-table" id="enquiriesTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Name</th>
              <th>Email</th>
              <th>Program</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody>
            <!-- Loaded via JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- COURSES TAB -->
    <div id="tab-courses" class="tab-content" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3>Manage Courses</h3>
        <button id="addCourseBtn" class="admin-btn admin-btn-primary">+ Add New Course</button>
      </div>
      <div class="admin-table-wrapper">
        <table class="admin-table" id="coursesTable">
          <thead>
            <tr>
              <th>Image</th>
              <th>Title</th>
              <th>Category</th>
              <th>Duration / Format</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- Loaded via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- COURSE MODAL -->
  <div id="courseModal">
    <div class="modal-content">
      <h3 id="modalTitle" style="margin-top: 0; margin-bottom: 20px;">Add New Course</h3>
      <form id="courseForm">
        <input type="hidden" id="courseId">
        
        <div class="form-group">
          <label>Course Title</label>
          <input type="text" id="courseTitle" class="admin-input" required>
        </div>
        
        <div class="form-group">
          <label>Category (e.g. Leadership & Management)</label>
          <select id="courseCategory" class="admin-input" required>
            <option value="Leadership & Management">Leadership & Management</option>
            <option value="Customer Service">Customer Service</option>
            <option value="Communication Skills">Communication Skills</option>
            <option value="Sales Training">Sales Training</option>
            <option value="Project Management">Project Management</option>
            <option value="Human Resources">Human Resources</option>
            <option value="Workplace Compliance">Workplace Compliance</option>
            <option value="Other">Other Professional Development</option>
          </select>
        </div>

        <div class="form-group" style="display: flex; gap: 16px;">
          <div style="flex: 1;">
            <label>Duration (e.g. 2 Days)</label>
            <input type="text" id="courseDuration" class="admin-input" required>
          </div>
          <div style="flex: 1;">
            <label>Format</label>
            <input type="text" id="courseFormat" class="admin-input" placeholder="e.g. Classroom / Virtual" required>
          </div>
        </div>

        <div class="form-group">
          <label>Short Description</label>
          <textarea id="courseDesc" class="admin-input" rows="3" required></textarea>
        </div>

        <div class="form-group">
          <label>Course Image (Upload via Cloudinary)</label>
          <img id="courseImgPreview" class="course-thumb-preview" src="" style="display: none;">
          <input type="file" id="courseImageFile" accept="image/*" class="admin-input" style="padding: 6px;">
          <input type="hidden" id="courseImageUrl">
          <div id="uploadStatus" style="font-size: 12px; color: #64748b; margin-top: -10px; margin-bottom: 10px;"></div>
        </div>

        <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px;">
          <button type="button" class="admin-btn admin-btn-outline" id="cancelCourseBtn">Cancel</button>
          <button type="submit" class="admin-btn admin-btn-primary" id="saveCourseBtn">Save Course</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/admin.js"></script>
</body>
</html>
